name: Java CI with Maven
permissions:
  contents: write
  checks: write
  pull-requests: write


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit-tests:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn -B test -DexcludedGroups=IntegrationTests --file pom.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2
        id: jacoco-unit-upload
        with:
          name: jacoco-unit-report
          path: target/jacoco.exec

  integration-tests:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Integration tests
        run: mvn -B verify -Dgroups=IntegrationTests -Djacoco.destFile=target/jacoco-it.exec --file pom.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2
        id: jacoco-it-upload
        with:
          name: jacoco-integration-report
          path: target/jacoco-it.exec

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'

  tests-reports:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Download unit exec
        uses: actions/download-artifact@v8
        with:
          name: jacoco-unit-report
          path: target

      - name: Download integration exec
        uses: actions/download-artifact@v8
        with:
          name: jacoco-integration-report
          path: target

      - name: Merge unit & it reports
        run: mvn jacoco:merge@merge-reports jacoco:report

      - name: Jacoco coverage summary
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 90