<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" fill="#0d0d0f" rx="10"/>

  <!-- Outer octagon — gold -->
  <polygon
    points="50,6 74,14 86,38 86,62 74,86 50,94 26,86 14,62 14,38 26,14"
    fill="none"
    stroke="#c8952a"
    stroke-width="3.5"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Inner rotated diamond — gold, slightly transparent -->
  <polygon
    points="50,24 70,50 50,76 30,50"
    fill="none"
    stroke="#c8952a"
    stroke-width="2.5"
    stroke-linejoin="round"
    opacity="0.85"
  />

  <!-- Crossing diagonals — subtle gold -->
  <line x1="30" y1="24" x2="70" y2="76" stroke="#c8952a" stroke-width="1.5" opacity="0.3"/>
  <line x1="70" y1="24" x2="30" y2="76" stroke="#c8952a" stroke-width="1.5" opacity="0.3"/>

  <!-- Center ring -->
  <circle cx="50" cy="50" r="10" fill="none" stroke="#c8952a" stroke-width="1.5" opacity="0.5"/>

  <!-- Center dot — solid gold -->
  <circle cx="50" cy="50" r="5.5" fill="#c8952a" filter="url(#glow)"/>

  <!-- Cardinal ticks — bright gold, bold -->
  <line x1="50" y1="6"  x2="50" y2="16"  stroke="#c8952a" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="50" y1="84" x2="50" y2="94"  stroke="#c8952a" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="6"  y1="50" x2="16" y2="50"  stroke="#c8952a" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="84" y1="50" x2="94" y2="50"  stroke="#c8952a" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

</svg>
