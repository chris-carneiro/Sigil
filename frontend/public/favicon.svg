<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0d0d0f"/>

  <!-- Outer octagon -->
  <polygon
    points="16,2 23,4.5 27.5,9 29.5,16 27.5,23 23,27.5 16,30 9,27.5 4.5,23 2.5,16 4.5,9 9,4.5"
    fill="none"
    stroke="#c8952a"
    stroke-width="1.5"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Inner diamond -->
  <polygon
    points="16,8 22,16 16,24 10,16"
    fill="none"
    stroke="#c8952a"
    stroke-width="1.5"
    opacity="0.8"
  />

  <!-- Cardinal ticks -->
  <line x1="16" y1="2"  x2="16" y2="5.5" stroke="#c8952a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="26.5" x2="16" y2="30" stroke="#c8952a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="2.5" y1="16" x2="6"  y2="16" stroke="#c8952a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="26" y1="16" x2="29.5" y2="16" stroke="#c8952a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.2" fill="#c8952a" filter="url(#glow)"/>

</svg>
